version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vcf_postgres
    environment:
      POSTGRES_USER: vcf
      POSTGRES_PASSWORD: vcfpass
      POSTGRES_DB: vcfdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vcf -d vcfdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vcf_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vcf:vcfpass@postgres:5432/vcfdb
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/data/uploads
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vcf_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
